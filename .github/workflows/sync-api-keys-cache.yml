name: Sync API Key Cache

on:
  schedule:
    - cron: "0 * * * *" # Hourly at minute 0 UTC
  workflow_dispatch:

jobs:
  sync-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Sync API key cache to Firestore
        run: |
          curl -f -X POST "${{ secrets.API_BASE_URL }}/sync-api-keys-cache" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
