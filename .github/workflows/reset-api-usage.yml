name: Reset API Key Usage

on:
  schedule:
    - cron: "0 0 1 * *" # First of every month at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  reset-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Reset API key usage counters
        run: |
          curl -f -X POST "${{ vars.API_BASE_URL }}/api/v1/reset-api-usage" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
