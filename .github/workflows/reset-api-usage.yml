name: Reset API Key Usage

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  reset-usage:
    runs-on: ubuntu-latest
    steps:
      - name: Reset API key usage counters
        run: |
          curl -f -X POST "${{ secrets.API_BASE_URL }}/reset-api-usage" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
